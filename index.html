<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luce Ofertas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- CABEÇALHO -->

    <header>

        <div class="logo">
            🛍️ <span>Luce</span> Ofertas
        </div>

        <div class="pesquisa">
            <input type="text" placeholder="O que você procura hoje?">
        </div>

        <div class="acoes">
            <button class="favorito">❤</button>
            <button class="menu">☰</button>
        </div>

    </header>

    <!-- BARRA DE INFORMAÇÕES -->

    <section class="informacoes">

        <div>✔ Ofertas verificadas</div>

        <div>🚚 Frete grátis</div>

        <div>🎟 Cupons atualizados</div>

        <div>❤️ Transparência total</div>

    </section>

    <!-- CATEGORIAS -->

    <section class="categorias">

        <button>🔥 Ofertas</button>
        <button>⭐ Mais vendidos</button>
        <button>📱 Eletrônicos</button>
        <button>🏠 Casa</button>
        <button>💄 Beleza</button>
        <button>👕 Moda</button>
        <button>🐶 Pets</button>
        <button>👶 Infantil</button>
        <button>🍳 Cozinha</button>
        <button>🚗 Automotivo</button>
        <button>🎁 Presentes</button>
        <button>💚 Promoções</button>

    </section>

    <!-- BANNER -->

    <section class="banner">

        <h1>Achadinhos que realmente valem a pena!</h1>

        <p>
            As melhores ofertas da Shopee reunidas em um único lugar.
        </p>

        <a href="#" class="botao">
            Ver ofertas
        </a>

    </section>

</body>

</html>
